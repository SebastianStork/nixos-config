name: "CI"
on:
  workflow_dispatch:
  push:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  parse-flake:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
      checks: ${{ steps.checks.outputs.checks }}
      servers: ${{ steps.servers.outputs.servers }}
      workstations: ${{ steps.workstations.outputs.workstations }}
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: experimental-features = nix-command flakes pipe-operators
      - name: Get checks
        id: checks
        run: |
          checks=$(nix flake show --json | jq -c '.checks."x86_64-linux" | keys')
          printf "checks=%s" "$checks" >> "$GITHUB_OUTPUT"
      - name: Get servers
        id: servers
        run: |
          servers=$(nix eval .#nixosConfigurations --apply 'configs:
            configs
            |> builtins.attrNames
            |> builtins.filter (hostName: configs.${hostName}.config.custom.services.comin.enable)
          ' --json)
          printf "servers=%s" "$servers" >> "$GITHUB_OUTPUT"
  build-check:
    name: ${{ matrix.check }}
    needs: parse-flake
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: ${{ fromJson(needs.parse-flake.outputs.checks) }}
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: experimental-features = nix-command flakes pipe-operators
      - uses: cachix/cachix-action@v15
        with:
          name: sebastian-stork
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          useDaemon: false
      - name: Build check
        run: nix build .#checks.x86_64-linux.${{ matrix.check }} --print-build-logs
  build-server:
    name: ${{ matrix.server }}
    needs: parse-flake
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server: ${{ fromJson(needs.parse-flake.outputs.servers) }}
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: experimental-features = nix-command flakes pipe-operators
      - uses: cachix/cachix-action@v15
        with:
          name: sebastian-stork
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          useDaemon: false
      - name: Build server
        run: nix build .#nixosConfigurations.${{ matrix.server }}.config.system.build.toplevel --print-build-logs
  trigger-deploy:
    needs: [build-check, build-server]
    runs-on: ubuntu-latest
    outputs:
      previous-sha: ${{ steps.previous-sha.outputs.sha }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Get previous deploy SHA
        id: previous-sha
        run: |
          sha=$(git ls-remote origin deploy | cut -f1)
          printf "sha=%s" "$sha" >> "$GITHUB_OUTPUT"
      - name: Push to deploy branch
        run: git push --force origin HEAD:refs/heads/deploy
  await-deploy:
    name: ${{ matrix.server }}
    needs: [parse-flake, trigger-deploy]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server: ${{ fromJson(needs.parse-flake.outputs.servers) }}
    steps:
      - name: Wait for deployment
        timeout-minutes: 5
        run: |
          repo_url="https://github.com/${{ github.repository }}.git"
          expected_sha="${{ github.sha }}"
          branch="deployed/${{ matrix.server }}"

          while true; do
            deployed_sha=$(git ls-remote "$repo_url" "$branch" | cut -f1)

            if [[ "$deployed_sha" == "$expected_sha" ]]; then
              echo "✅ ${{ matrix.server }} deployed $expected_sha"
              exit 0
            else
              echo "⏳ ${{ matrix.server }}: deployed ${deployed_sha::7}, waiting for ${expected_sha::7}..."
            fi

            sleep 5
          done
  rollback-deploy:
    if: always() && needs.await-deploy.result == 'failure'
    needs: [trigger-deploy, await-deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Rollback deploy branch
        run: |
          previous_sha="${{ needs.trigger-deploy.outputs.previous-sha }}"
          echo "Rolling back deploy branch to $previous_sha"
          git push --force origin "$previous_sha:refs/heads/deploy"
  notify:
    if: always()
    needs: [await-deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Notify success
        if: needs.await-deploy.result == 'success'
        run: |
          curl -s \
            -H "Title: CI: Deploy succeeded" \
            -H "Priority: low" \
            -H "Tags: white_check_mark" \
            -H "Actions: view, Open workflow run, ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -H "Markdown: yes" \
            -d "Commit \`${GITHUB_SHA::7}\` deployed successfully." \
            https://ntfy.sh/splitleaf
      - name: Notify failure
        if: needs.await-deploy.result == 'failure'
        run: |
          curl -s \
            -H "Title: CI: Deploy failed" \
            -H "Priority: default" \
            -H "Tags: rotating_light" \
            -H "Actions: view, Open workflow run, ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -H "Markdown: yes" \
            -d "Commit \`${GITHUB_SHA::7}\` failed to deploy." \
            https://ntfy.sh/splitleaf
