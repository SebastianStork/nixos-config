name: "CI"
on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.ref }}
  cancel-in-progress: true

jobs:
  build-checks-and-tests:
    uses: ./.forgejo/workflows/check-test.yml
    secrets:
      S3_KEY_ID: ${{ secrets.S3_KEY_ID }}
      S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}

  parse-systems:
    runs-on: nixos
    outputs:
      servers: ${{ steps.servers.outputs.servers }}
      workstations: ${{ steps.workstations.outputs.workstations }}
    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4
        with:
          persist-credentials: false
      - name: Get servers
        id: servers
        run: |
          servers=$(nix eval .#nixosConfigurations --apply 'configs:
            configs
            |> builtins.attrNames
            |> builtins.filter (hostName: configs.${hostName}.config.custom.services.deploy-webhook.enable)
          ' --json)
          printf "servers=%s" "$servers" >> "$FORGEJO_OUTPUT"
      - name: Get workstations
        id: workstations
        run: |
          workstations=$(nix eval .#nixosConfigurations --apply 'configs:
            configs
            |> builtins.attrNames
            |> builtins.filter (hostName: !configs.${hostName}.config.custom.services.deploy-webhook.enable)
          ' --json)
          printf "workstations=%s" "$workstations" >> "$FORGEJO_OUTPUT"

  build-server:
    needs: parse-systems
    runs-on: nixos
    strategy:
      fail-fast: false
      matrix:
        server: ${{ fromJSON(needs.parse-systems.outputs.servers) }}
    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4
        with:
          persist-credentials: false
      - name: Build
        uses: ./.forgejo/actions/build
        with:
          flake-output: .#nixosConfigurations.${{ matrix.server }}.config.system.build.toplevel
      - name: Upload
        uses: ./.forgejo/actions/upload
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}

  build-workstation:
    needs: parse-systems
    runs-on: nixos
    strategy:
      fail-fast: false
      matrix:
        workstation: ${{ fromJSON(needs.parse-systems.outputs.workstations) }}
    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4
        with:
          persist-credentials: false
      - name: Build
        uses: ./.forgejo/actions/build
        with:
          flake-output: .#nixosConfigurations.${{ matrix.workstation }}.config.system.build.toplevel
      - name: Upload
        uses: ./.forgejo/actions/upload
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}

  deploy:
    needs: [build-checks-and-tests, parse-systems, build-server]
    runs-on: nixos
    strategy:
      fail-fast: false
      matrix:
        server: ${{ fromJSON(needs.parse-systems.outputs.servers) }}
    steps:
      - name: Deploy
        timeout-minutes: 30
        env:
          URL: https://${{ matrix.server }}.splitleaf.de/hooks/deploy
        run: |
          for attempt in $(seq 1 10); do
            http_code=$(curl --silent --show-error --output response.txt --write-out '%{http_code}' --max-time 1800 "$URL" || echo 000)
            case "$http_code" in
              200) cat response.txt; exit 0 ;;
              500) cat response.txt; exit 1 ;;
              *)
                echo "Transient error (HTTP $http_code), retry $attempt/10"
                sleep 10
                ;;
            esac
          done
          echo "Max retries exceeded"
          exit 1

  notify:
    if: always()
    needs: deploy
    runs-on: nixos
    steps:
      - name: Notify success
        if: needs.deploy.result == 'success'
        env:
          SHA: ${{ forgejo.sha }}
          COMMIT_MSG: ${{ forgejo.event.head_commit.message }}
        run: |
          body=$(printf 'Commit `%s` deployed successfully.\n> %s' "${SHA::7}" "${COMMIT_MSG%%$'\n'*}")
          curl -s \
            -H "Title: CI: Deployment succeeded" \
            -H "Priority: low" \
            -H "Tags: white_check_mark" \
            -H "Actions: view, Open workflow run, ${{ forgejo.server_url }}/${{ forgejo.repository }}/actions/runs/${{ forgejo.run_number }}" \
            -H "Markdown: yes" \
            -d "$body" \
            https://ntfy.sh/splitleaf
      - name: Notify failure
        if: needs.deploy.result == 'failure' || needs.deploy.result == 'skipped'
        env:
          SHA: ${{ forgejo.sha }}
          COMMIT_MSG: ${{ forgejo.event.head_commit.message }}
        run: |
          body=$(printf 'Commit `%s` failed to deploy.\n> %s' "${SHA::7}" "${COMMIT_MSG%%$'\n'*}")
          curl -s \
            -H "Title: CI: Deployment failed" \
            -H "Priority: default" \
            -H "Tags: rotating_light" \
            -H "Actions: view, Open workflow run, ${{ forgejo.server_url }}/${{ forgejo.repository }}/actions/runs/${{ forgejo.run_number }}" \
            -H "Markdown: yes" \
            -d "$body" \
            https://ntfy.sh/splitleaf
